<!DOCTYPE html>
<html>
<head>
    <title>Neon Dash Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 24px; pointer-events: none; z-index: 5; display: none; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 20px 60px; font-size: 30px; background: #00ffcc; border: none; border-radius: 15px; font-weight: bold; color: #000; box-shadow: 0 0 30px #00ffcc; -webkit-appearance: none; }
        h1 { color: #fff; font-size: 40px; text-shadow: 0 0 15px #0ff; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div id="ui">PERCENT: <span id="percent">0</span>%</div>
    
    <div id="menu">
        <h1>NEON DASH</h1>
        <button id="start-btn">TAP TO START</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let audioCtx;
    let gameActive = false;
    let distance = 0;
    const speed = 8;
    const groundY = canvas.height / 2 + 100;

    const player = { x: 100, y: groundY-40, w: 40, h: 40, dy: 0, onGround: false, rotation: 0 };
    const level = [0,0,0,2,0,1,0,2,0,1,1,2,0,2,2,0,1,1,2,0,2,2,2,1,1,0,2];
    const obstacles = level.map((t, i) => ({ x: 800 + (i * 200), type: t }));

    function startGame() {
        // Forzar activación de audio
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        
        menu.style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        gameActive = true;
        animate();
    }

    // Listener mejorado para móviles
    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startGame();
    }, {once: true});

    function animate() {
        if (!gameActive) return;

        // Limpiar
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Suelo
        ctx.fillStyle = '#0ff';
        ctx.fillRect(0, groundY, canvas.width, 2);

        // Física básica
        player.dy += 1.1;
        player.y += player.dy;
        distance += speed;

        if (player.y >= groundY - player.h) {
            player.y = groundY - player.h;
            player.dy = 0;
            player.onGround = true;
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
        } else {
            player.onGround = false;
            player.rotation += 0.15;
        }

        // Obstáculos y Colisión
        obstacles.forEach(o => {
            let ox = o.x - distance;
            if (o.type === 1) {
                ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff';
                ctx.fillRect(ox, groundY-50, 50, 50); ctx.strokeRect(ox, groundY-50, 50, 50);
                if (player.x+40 > ox && player.x < ox+50 && player.y+40 > groundY-50) {
                    if (player.y+40 < groundY-25) { player.y = groundY-90; player.dy=0; player.onGround=true; }
                    else location.reload();
                }
            } else if (o.type === 2) {
                ctx.fillStyle = '#f05';
                ctx.beginPath(); ctx.moveTo(ox, groundY); ctx.lineTo(ox+25, groundY-50); ctx.lineTo(ox+50, groundY); ctx.fill();
                if (player.x+35 > ox && player.x+5 < ox+50 && player.y+35 > groundY-50) location.reload();
            }
        });

        // Jugador
        ctx.save();
        ctx.translate(player.x+20, player.y+20);
        ctx.rotate(player.rotation);
        ctx.fillStyle = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40);
        ctx.restore();

        document.getElementById('percent').innerText = Math.floor(distance/50);
        requestAnimationFrame(animate);
    }

    window.addEventListener('touchstart', (e) => {
        if (gameActive && player.onGround) {
            player.dy = -15;
            player.onGround = false;
        }
        e.preventDefault();
    }, {passive: false});
</script>
</body>
</html>
