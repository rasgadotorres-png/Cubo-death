<!DOCTYPE html>
<html>
<head>
    <title>Neon Dash Ultra Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #ff0000; touch-action: none; font-family: sans-serif; }
        #percent { position: fixed; top: 10px; width: 100%; text-align: center; color: #0ff; font-size: 24px; font-weight: bold; z-index: 100; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #btn { padding: 20px 50px; font-size: 25px; background: #0fcc; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="percent">0%</div>
    <div id="overlay"><button id="btn">TAP TO START</button></div>
    <canvas id="g"></canvas>

<script>
    const cvs = document.getElementById('g');
    const ctx = cvs.getContext('2d');
    const overlay = document.getElementById('overlay');
    const btn = document.getElementById('btn');

    let active = false;
    let dist = 0;
    let isPress = false;

    function init() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        overlay.style.display = 'none';
        active = true;
        loop();
    }

    btn.addEventListener('touchstart', (e) => { e.preventDefault(); init(); }, {once: true});
    btn.addEventListener('click', init, {once: true});

    const ground = window.innerHeight / 2 + 100;
    const player = { y: ground - 40, dy: 0, rot: 0 };
    const level = [0,0,2,0,1,0,2,2,0,1,1,2,0,2,2];

    function loop() {
        if(!active) return;

        // Fondo
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // Suelo
        ctx.fillStyle = '#0ff';
        ctx.fillRect(0, ground, cvs.width, 2);

        // Movimiento
        dist += 8;
        player.dy += 1.1;
        player.y += player.dy;

        if(player.y > ground - 40) {
            player.y = ground - 40;
            player.dy = 0;
            if(isPress) player.dy = -16;
            player.rot = Math.round(player.rot / 1.57) * 1.57;
        } else {
            player.rot += 0.2;
        }

        // Obstáculos
        level.forEach((t, i) => {
            let x = 600 + (i * 300) - dist;
            if(t === 1) {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff';
                ctx.fillRect(x, ground-50, 50, 50); ctx.strokeRect(x, ground-50, 50, 50);
                if(150+40 > x && 150 < x+50 && player.y+40 > ground-50) dist = 0;
            } else if(t === 2) {
                ctx.fillStyle = '#f05'; ctx.beginPath();
                ctx.moveTo(x, ground); ctx.lineTo(x+25, ground-50); ctx.lineTo(x+50, ground); ctx.fill();
                if(150+30 > x && 150+10 < x+50 && player.y+40 > ground-35) dist = 0;
            }
        });

        // Cubo
        ctx.save();
        ctx.translate(150+20, player.y+20);
        ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40);
        ctx.restore();

        document.getElementById('percent').innerText = Math.floor(dist/50) + "%";
        requestAnimationFrame(loop);
    }

    window.addEventListener('touchstart', () => isPress = true);
    window.addEventListener('touchend', () => isPress = false);
</script>
</body>
</html>
