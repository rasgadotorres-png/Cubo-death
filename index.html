<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Final Final Obet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; z-index: 10; font-weight: bold; }
        .menu { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        button { padding: 25px 80px; font-size: 28px; background: #0fcc; border: none; border-radius: 50px; cursor: pointer; color: #000; font-weight: bold; box-shadow: 0 0 30px #0fcc; }
    </style>
</head>
<body>

    <div id="ui">PROGRESO: <span id="prog">0</span>%</div>

    <div id="startMenu" class="menu">
        <h1 style="color:#f05; font-size: 50px;">DEATH CUBE</h1>
        <p style="color:#fff;">VERSIÓN CORREGIDA AL 100%</p>
        <button onclick="startGame()">JUGAR</button>
    </div>

    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const floor = canvas.height / 2 + 100;
    let dist = 0, active = false, pressing = false;
    const player = { x: 100, y: floor - 40, dy: 0, rot: 0, size: 40 };

    // Nivel 1: Re-calibrado para que sea fluido y posible
    const level = [
        [1,0],[1,0],[1,0], // Inicio seguro
        [1,30],[2,50],[1,50],[1,0],[2,80],[1,80],[1,0],
        [1,40],[2,100],[1,100],[1,0],[2,20],[1,120],[1,120]
    ];

    function startGame() {
        document.getElementById('startMenu').style.display = 'none';
        dist = 0; player.y = floor - 40; player.dy = 0; player.rot = 0; active = true;
    }

    function update() {
        if (!active) return;
        dist += 8.5; player.dy += 1.15; player.y += player.dy;

        if (player.y > canvas.height) startGame();

        let onGround = false;
        const step = 280;

        level.forEach((obj, i) => {
            let bx = 100 + (i * step) - dist;
            let by = floor - 40 - obj[1];

            // Detección de colisión ultra-precisa
            if (bx > player.x - 80 && bx < player.x + 80) {
                if (obj[0] === 1) {
                    // Si el cubo está cayendo y toca la plataforma (margen de 30px)
                    if (player.dy >= 0 && player.y + player.size >= by && player.y + player.size <= by + 30) {
                        player.y = by - player.size;
                        player.dy = 0;
                        player.rot = 0; // Se endereza instantáneamente
                        onGround = true;
                    } 
                    // Muerte solo si choca de frente contra la pared del bloque
                    else if (player.x + player.size > bx + 20 && player.y + player.size > by + 10 && player.y < by + 35) {
                        startGame();
                    }
                } else { // Sierra
                    let dx = (player.x + 20) - (bx + 40);
                    let dy = (player.y + 20) - (by + 20);
                    if (Math.sqrt(dx*dx + dy*dy) < 22) startGame();
                }
            }
        });

        if (onGround) {
            if (pressing) player.dy = -21;
        } else {
            player.rot += 0.22;
        }
        document.getElementById('prog').innerText = Math.min(Math.floor((dist/4800)*100), 100);
    }

    function draw() {
        ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#333'; ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, floor); ctx.lineTo(canvas.width, floor); ctx.stroke();
        ctx.setLineDash([]);

        level.forEach((obj, i) => {
            let bx = 100 + (i * 280) - dist;
            if (bx < -100 || bx > canvas.width) return;
            let by = floor - 40 - obj[1];

            if (obj[0] === 1) {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(bx, by, 90, 45); ctx.strokeRect(bx, by, 90, 45);
            } else {
                ctx.fillStyle = '#f05';
                ctx.beginPath(); ctx.arc(bx+45, by+20, 20, 0, Math.PI*2); ctx.fill();
            }
        });

        ctx.save(); ctx.translate(player.x + 20, player.y + 20); ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.shadowBlur = 10; ctx.shadowColor = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40); ctx.restore();

        update(); requestAnimationFrame(draw);
    }

    window.onpointerdown = () => pressing = true;
    window.onpointerup = () => pressing = false;
    draw();
</script>
</body>
</html>
