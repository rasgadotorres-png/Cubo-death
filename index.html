<!DOCTYPE html>
<html>
<head>
    <title>Neon Dash Pro Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #percent { position: fixed; top: 10px; width: 100%; text-align: center; color: #0ff; font-size: 24px; pointer-events: none; text-shadow: 0 0 10px #0ff; }
    </style>
</head>
<body>
    <div id="percent">0%</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const groundY = canvas.height / 2 + 100;
    let distance = 0;
    let isPressing = false;
    let audioCtx;

    const player = { x: 150, y: groundY - 40, w: 40, h: 40, dy: 0, onGround: false, rot: 0 };
    const level = [0,0,2,0,1,0,2,0,1,1,2,0,2,2,0,1,1,1,2,0,2,2,1,0,1,2,2];

    // Función de sonido reforzada
    function playSfx() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function update() {
        distance += 8.5;
        player.dy += 1.1;
        player.y += player.dy;

        let onAnything = false;

        // Suelo normal
        if (player.y >= groundY - player.h) {
            player.y = groundY - player.h;
            player.dy = 0;
            onAnything = true;
        }

        // Lógica de Bloques y Picos
        level.forEach((type, i) => {
            let ox = 800 + (i * 250) - distance;
            if (ox > player.x - 60 && ox < player.x + 60) {
                if (type === 1) { // BLOQUE
                    // Detectar si estamos cayendo sobre el bloque
                    if (player.y + player.h > groundY - 50 && player.y + player.h < groundY - 20 && player.dy >= 0) {
                        player.y = groundY - 50 - player.h;
                        player.dy = 0;
                        onAnything = true;
                    } 
                    // Si no estamos arriba, pero estamos chocando de lado
                    else if (player.x + player.w > ox && player.x < ox + 50 && player.y + player.h > groundY - 45) {
                        distance = 0; // Muere
                    }
                } else if (type === 2) { // PICO
                    if (player.x + player.w - 10 > ox && player.x + 10 < ox + 50 && player.y + player.h > groundY - 40) {
                        distance = 0; // Muere
                    }
                }
            }
        });

        player.onGround = onAnything;

        if (player.onGround) {
            player.rot = Math.round(player.rot / (Math.PI/2)) * (Math.PI/2);
            if (isPressing) {
                player.dy = -16;
                player.onGround = false;
                playSfx();
            }
        } else {
            player.rot += 0.18;
        }

        document.getElementById('percent').innerText = Math.floor(distance / 100) + "%";
    }

    function draw() {
        ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0ff'; ctx.fillRect(0, groundY, canvas.width, 2);

        level.forEach((type, i) => {
            let ox = 800 + (i * 250) - distance;
            if (type === 1) {
                ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#0ff';
                ctx.fillRect(ox, groundY-50, 50, 50); ctx.strokeRect(ox, groundY-50, 50, 50);
            } else if (type === 2) {
                ctx.fillStyle = '#f05'; ctx.beginPath();
                ctx.moveTo(ox, groundY); ctx.lineTo(ox+25, groundY-50); ctx.lineTo(ox+50, groundY); ctx.fill();
            }
        });

        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.shadowBlur = 10; ctx.shadowColor = '#0fcc';
        ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    // Activar audio con el primer toque
    window.addEventListener('touchstart', (e) => {
        if (!audioCtx) {

        }
