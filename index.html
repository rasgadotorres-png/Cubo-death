<!DOCTYPE html>
<html>
<head>
    <title>Geometry Dash Original Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black'; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">PERCENT: <span id="percent">0</span>%</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const percentEl = document.getElementById('percent');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const gravity = 1.0;
    const jumpForce = -15;
    const speed = 8;
    const groundY = canvas.height / 2 + 100;

    let distance = 0;
    let gameActive = true;

    const player = {
        x: 150, y: groundY - 40, w: 40, h: 40,
        dy: 0, rotation: 0, onGround: false
    };

    // Mapa: 1 = Bloque (puedes subirte), 2 = Pico (mueres)
    const levelData = [0,0,0,2,0,1,0,2,0,1,1,0,2,2,0,1,1,1,2,0,0,1,0,2,2,2,0,1,1,0,2,0,1,1,1];
    const obstacles = levelData.map((type, i) => ({
        x: 800 + (i * 180),
        y: groundY,
        type: type,
        w: 50,
        h: 50
    }));

    function update() {
        if (!gameActive) return;

        distance += speed;
        player.dy += gravity;
        player.y += player.dy;

        let standingOnObject = false;

        // Suelo básico
        if (player.y > groundY - player.h) {
            player.y = groundY - player.h;
            player.dy = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        // Colisiones con objetos
        obstacles.forEach(obj => {
            let objX = obj.x - distance;
            
            // Si el objeto está en pantalla
            if (objX > -100 && objX < canvas.width) {
                // Colisión tipo "Caja"
                if (player.x + player.w > objX && player.x < objX + obj.w) {
                    
                    if (obj.type === 2) { // PICO: Muerte inmediata
                        if (player.y + player.h > obj.y - obj.h + 10) gameOver();
                    } 
                    else if (obj.type === 1) { // BLOQUE
                        // ¿Está cayendo encima del bloque?
                        if (player.y + player.h > obj.y - obj.h && 
                            player.y + player.h < obj.y - obj.h + 25 && 
                            player.dy >= 0) {
                            player.y = obj.y - obj.h - player.h;
                            player.dy = 0;
                            player.onGround = true;
                            standingOnObject = true;
                        } 
                        // Si le pega de frente
                        else if (player.y + player.h > obj.y - obj.h + 5) {
                            gameOver();
                        }
                    }
                }
            }
        });

        if (!player.onGround) {
            player.rotation += 0.15;
        } else {
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
        }

        percentEl.innerText = Math.min(Math.floor((distance / (obstacles.length * 180)) * 100), 100);
    }

    function draw() {
        ctx.fillStyle = '#0f052d'; // Fondo morado oscuro
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar Suelo
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(0, groundY, canvas.width, 2);

        // Dibujar Obstáculos
        obstacles.forEach(obj => {
            let objX = obj.x - distance;
            if (obj.type === 1) { // BLOQUE
                ctx.fillStyle = '#333';
                ctx.strokeStyle = '#0ff';
                ctx.fillRect(objX, obj.y - obj.h, obj.w, obj.h);
                ctx.strokeRect(objX, obj.y - obj.h, obj.w, obj.h);
            } else if (obj.type === 2) { // PICO
                ctx.fillStyle = '#ff0055';
                ctx.beginPath();
                ctx.moveTo(objX, obj.y);
                ctx.lineTo(objX + obj.w/2, obj.y - obj.h);
                ctx.lineTo(objX + obj.w, obj.y);
                ctx.fill();
            }
        });

        // Dibujar Jugador
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        ctx.rotate(player.rotation);
        ctx.fillStyle = '#00ffcc';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ffcc';
        ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
        ctx.restore();

        update();
        if (gameActive) requestAnimationFrame(draw);
    }

    function gameOver() {
        gameActive = false;
        setTimeout(() => location.reload(), 500);
    }

    window.addEventListener('touchstart', (e) => {
        if (player.onGround) player.dy = jumpForce;
        e.preventDefault();
    }, {passive: false});

    draw();
</script>
</body>
</html>
