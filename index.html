<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Precision Jump</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050510; touch-action: none; font-family: 'Arial Black', sans-serif; transition: background 1.5s ease; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 16px; z-index: 5; pointer-events: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        h1 { color: #f05; font-size: 40px; text-shadow: 0 0 15px #f05; margin: 0; }
        .btn-real { padding: 20px 50px; font-size: 20px; background: #0fcc; border: 3px solid #fff; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">LVL: <span id="lvlNum">1</span> | <span id="percent">0</span>%</div>

    <div id="menu" class="overlay">
        <h1>DEATH CUBE</h1>
        <div style="color:#0fcc;">FIXED JUMPS - BY OBET</div>
        <button class="btn-real" id="mainStartBtn">START GAME</button>
    </div>

    <div id="victory" class="overlay" style="display:none">
        <h1 style="color: #0fcc">LEVEL CLEAR!</h1>
        <button class="btn-real" id="nextLvlBtn">NEXT LEVEL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const voidLine = canvas.height / 2 + 150; 
    let currentLvl = 1;
    let distance = 0;
    let isPressing = false;
    let canJump = true;
    let gameActive = false;
    let levelStarted = false;
    const step = 260; // Un poco más de espacio para que el arco de salto sea cómodo

    const player = { x: 150, y: voidLine - 90, dy: 0, rot: 0, onG: true };

    const safeStart = [[1,0],[1,0],[1,0],[1,0]];
    
    function createLevel(pattern) {
        let level = [...safeStart];
        for(let i=0; i<15; i++) { level = level.concat(pattern); }
        level.push([1,0],[1,0],[1,0]);
        return level;
    }

    const levelsData = {
        1: createLevel([[1,0],[2,-20],[1,0],[1,40],[2,20],[1,40]]), // Sierras más bajas para saltar sobre ellas
        2: createLevel([[1,0],[2,0],[1,60],[2,40],[1,20],[2,-10]]),
        3: createLevel([[1,0],[2,30],[1,100],[2,120],[1,60],[2,10]])
    };

    function initLevel() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('victory').style.display = 'none';
        distance = 0;
        levelStarted = false;
        player.y = voidLine - 90;
        player.dy = 0;
        player.onG = true;
        gameActive = true;
    }

    document.getElementById('mainStartBtn').onclick = initLevel;
    document.getElementById('nextLvlBtn').onclick = () => { currentLvl++; initLevel(); };

    function update() {
        if (!gameActive) return;
        if (!levelStarted) {
            if (isPressing) { levelStarted = true; player.dy = -17; player.onG = false; }
            return;
        }

        distance += 8.5;
        player.dy += 1.3; // Gravedad firme
        player.y += player.dy;

        const lvlBlocks = levelsData[currentLvl] || levelsData[1];
        const totalDist = (lvlBlocks.length - 1) * step;
        let progress = Math.min(Math.floor((distance/totalDist)*100), 100);

        if (distance > totalDist + 400) {
            gameActive = false;
            document.getElementById('victory').style.display = 'flex';
            return;
        }

        if (player.y > voidLine + 100) initLevel();

        let supported = false;
        lvlBlocks.forEach((obj, i) => {
            let ox = 150 + (i * step) - distance;
            let oy = voidLine - 50 - obj[1];
            
            if (ox > player.x - 55 && ox < player.x + 55) {
                if (obj[0] === 1) {
                    if (player.y + 40 <= oy + 30 && player.y + 40 + player.dy >= oy && player.x + 35 > ox) {
                        player.y = oy - 40; player.dy = 0; supported = true; canJump = true;
                    } else if (player.x + 35 > ox + 8 && player.y + 35 > oy && player.y < oy + 45) {
                        initLevel();
                    }
                }
                else if (obj[0] === 2) {
                    let sX = ox + 25;
                    let sY = oy + 45; // Bajamos la sierra físicamente
                    let dist = Math.sqrt((player.x+20 - sX)**2 + (player.y+20 - sY)**2);
                    if (dist < 28) initLevel(); // Hitbox más pequeña y justa
                }
            }
        });

        player.onG = supported;
        if (player.onG) {
            player.rot = Math.round(player.rot/1.57)*1.57;
            if (isPressing && canJump) { player.dy = -17; player.onG = false; canJump = false; }
        } else { player.rot += 0.22; }

        document.getElementById('lvlNum').innerText = currentLvl;
        document.getElementById('percent').innerText = progress;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#f05'; ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, voidLine); ctx.lineTo(canvas.width, voidLine); ctx.stroke();
        ctx.setLineDash([]);

        const lvlBlocks = levelsData[currentLvl] || levelsData[1];
        lvlBlocks.forEach((obj, i) => {
            let ox = 150 + (i * step) - distance;
            if (ox < -100 || ox > canvas.width + 100) return;
            let oy = voidLine - 50 - obj[1];
            
            if (obj[0] === 1) {
                ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(ox, oy, 50, 50); ctx.strokeRect(ox, oy, 50, 50);
            } else {
                ctx.save();
                ctx.translate(ox + 25, oy + 45); // Dibujamos la sierra más abajo
                ctx.rotate(Date.now() * 0.012);
                ctx.fillStyle = '#ff4400';
                for(let j=0; j<8; j++) {
                    ctx.rotate(Math.PI/4);
                    ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(8, 0); ctx.lineTo(-8, 0); ctx.fill();
                }
                ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        });

        ctx.save(); ctx.translate(player.x+20, player.y+20); ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.fillRect(-20, -20, 40, 40);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.onpointerdown = () => isPressing = true;
    window.onpointerup = () => isPressing = false;
    draw();
</script>
</body>
</html>
