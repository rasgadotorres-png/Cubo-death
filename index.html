<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Final Ultra Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050510; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #0ff; font-size: 18px; z-index: 10; pointer-events: none; }
        .menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        button { padding: 20px 60px; font-size: 24px; background: #0fcc; border: 4px solid #fff; border-radius: 20px; cursor: pointer; color: #000; font-weight: bold; box-shadow: 0 0 25px #0fcc; }
    </style>
</head>
<body>

    <div id="ui">LEVEL 1 | <span id="prog">0</span>%</div>

    <div id="startMenu" class="menu">
        <h1 style="color:#f05; font-size: 50px; margin:0; text-shadow: 0 0 20px #f05;">DEATH CUBE</h1>
        <p style="color:#fff; margin-bottom:30px;">TOTAL FIX: SIN ERRORES DE SALTO</p>
        <button onclick="startGame()">¡A JUGAR!</button>
    </div>

    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const floorLine = canvas.height / 2 + 100;
    let dist = 0;
    let active = false;
    let pressing = false;
    
    const player = { x: 100, y: floorLine - 50, dy: 0, rot: 0, size: 40 };

    // Nivel 1 calibrado: Espacios justos y alturas alcanzables
    const level1 = [
        [1,0],[1,0],[1,0], 
        [1,40],[2,70],[1,0],[1,80],[2,120],[1,40],
        [1,0],[2,50],[1,100],[1,100],[2,30],[1,0]
    ];

    function startGame() {
        document.getElementById('startMenu').style.display = 'none';
        dist = 0;
        player.y = floorLine - 50;
        player.dy = 0;
        player.rot = 0;
        active = true;
    }

    function update() {
        if (!active) return;

        dist += 9; // Velocidad constante
        player.dy += 1.2; // Gravedad firme
        player.y += player.dy;

        if (player.y > canvas.height) startGame();

        let onGround = false;
        const step = 270; 

        level1.forEach((obj, i) => {
            let bx = 100 + (i * step) - dist;
            let by = floorLine - 40 - obj[1];

            // RANGO DE COLISIÓN (bx es el inicio del bloque)
            if (bx > player.x - 85 && bx < player.x + 70) {
                if (obj[0] === 1) { 
                    // ATERRIZAJE (Detecta si estás sobre el bloque)
                    if (player.y + player.size >= by && player.y + player.size <= by + 35 && player.dy >= 0) {
                        player.y = by - player.size;
                        player.dy = 0;
                        player.rot = 0; // Se endereza al tocar suelo
                        onGround = true;
                    } 
                    // CHOQUE FRONTAL (Solo si no estás aterrizando)
                    else if (player.x + player.size > bx + 20 && player.y + player.size > by + 10 && player.y < by + 40) {
                        startGame();
                    }
                } else { // SIERRA
                    let dx = (player.x + 20) - (bx + 35);
                    let dy = (player.y + 20) - (by + 20);
                    if (Math.sqrt(dx*dx + dy*dy) < 24) startGame();
                }
            }
        });

        if (onGround) {
            if (pressing) player.dy = -21.5; // Salto potente y seguro
        } else {
            player.rot += 0.25; // Rotación aérea estética
        }

        document.getElementById('prog').innerText = Math.min(Math.floor((dist/4200)*100), 100);
    }

    function draw() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Guía visual del vacío
        ctx.strokeStyle = '#f05'; ctx.lineWidth = 2; ctx.setLineDash([10, 15]);
        ctx.beginPath(); ctx.moveTo(0, floorLine); ctx.lineTo(canvas.width, floorLine); ctx.stroke();
        ctx.setLineDash([]);

        const step = 270;
        level1.forEach((obj, i) => {
            let bx = 100 + (i * step) - dist;
            if (bx < -150 || bx > canvas.width + 50) return;
            let by = floorLine - 40 - obj[1];

            if (obj[0] === 1) {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(bx, by, 85, 45); ctx.strokeRect(bx, by, 85, 45);
            } else {
                ctx.fillStyle = '#ff4400';
                ctx.beginPath(); ctx.arc(bx+42, by+22, 20, 0, Math.PI*2); ctx.fill();
            }
        });

        // El Cubo (Jugador)
        ctx.save();
        ctx.translate(player.x + 20, player.y + 20);
        ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.onpointerdown = () => pressing = true;
    window.onpointerup = () => pressing = false;
    draw();
</script>
</body>
</html>
