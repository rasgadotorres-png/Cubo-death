<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Final Obet Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050510; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 18px; z-index: 5; pointer-events: none; text-shadow: 0 0 5px #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        h1 { color: #f05; font-size: 45px; text-shadow: 0 0 20px #f05; margin: 0; }
        .btn { padding: 20px 60px; font-size: 22px; background: #0fcc; border: 4px solid #fff; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; box-shadow: 0 0 20px #0fcc; }
    </style>
</head>
<body>

    <div id="ui">LVL: <span id="lvlNum">1</span> | <span id="percent">0</span>%</div>

    <div id="menu" class="overlay">
        <h1>DEATH CUBE</h1>
        <div style="color:#0fcc; margin-bottom:20px;">VERSION FINAL - BY OBET</div>
        <button class="btn" onclick="initLevel()">START GAME</button>
    </div>

    <div id="victory" class="overlay" style="display:none">
        <h1 style="color: #0fcc">COMPLETE!</h1>
        <button class="btn" onclick="nextLvl()">NEXT LEVEL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const voidLine = canvas.height / 2 + 120; 
    let currentLvl = 1;
    let distance = 0;
    let isPressing = false;
    let gameActive = false;
    let levelStarted = false;
    const step = 280; 

    const player = { x: 150, y: voidLine - 100, dy: 0, rot: 0, onG: true };

    // Estructura de nivel: [tipo, alturaY]
    const safeStart = [[1,0],[1,0],[1,0]];
    
    function createLevel(pattern) {
        let level = [...safeStart];
        for(let i=0; i<15; i++) { level = level.concat(pattern); }
        level.push([1,0],[1,0],[1,0]);
        return level;
    }

    const levels = {
        1: createLevel([[1,30],[2,50],[1,0],[1,60],[2,80],[1,60]]),
        2: createLevel([[1,0],[2,60],[1,90],[2,20],[1,40],[2,100]]),
        3: createLevel([[1,100],[2,150],[1,0],[2,40],[1,120],[2,180]])
    };

    function initLevel() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('victory').style.display = 'none';
        distance = 0;
        levelStarted = false;
        player.y = voidLine - 100;
        player.dy = 0;
        player.rot = 0;
        player.onG = true;
        gameActive = true;
    }

    function nextLvl() {
        currentLvl = currentLvl < 3 ? currentLvl + 1 : 1;
        initLevel();
    }

    function update() {
        if (!gameActive) return;
        if (!levelStarted) {
            if (isPressing) { levelStarted = true; player.dy = -19; }
            return;
        }

        distance += 9; // Velocidad fluida
        player.dy += 1.1; // Gravedad ajustada para saltos largos
        player.y += player.dy;

        const lvlData = levels[currentLvl];
        const totalDist = (lvlData.length - 1) * step;
        let progress = Math.min(Math.floor((distance/totalDist)*100), 100);

        if (distance > totalDist + 300) {
            gameActive = false;
            document.getElementById('victory').style.display = 'flex';
            return;
        }

        if (player.y > voidLine + 200) initLevel();

        let supported = false;
        lvlData.forEach((obj, i) => {
            let ox = 150 + (i * step) - distance;
            let oy = voidLine - 50 - obj[1];
            
            // Colisión con Bloques (Ancho de 80px para aterrizar fácil)
            if (ox > player.x - 80 && ox < player.x + 60) {
                if (obj[0] === 1) {
                    // Detectar si el cubo cae sobre el bloque
                    if (player.y + 40 >= oy && player.y + 40 <= oy + 40 && player.dy >= 0) {
                        player.y = oy - 40;
                        player.dy = 0;
                        supported = true;
                    } 
                    // Colisión frontal suavizada
                    else if (player.x + 35 > ox + 20 && player.y + 35 > oy + 10 && player.y < oy + 40) {
                        initLevel();
                    }
                } else if (obj[0] === 2) { // SIERRA
                    let sX = ox + 40;
                    let sY = oy + 30;
                    let d = Math.sqrt((player.x+20 - sX)**2 + (player.y+20 - sY)**2);
                    if (d < 25) initLevel();
                }
            }
        });

        if (supported) {
            player.rot = Math.round(player.rot/(Math.PI/2))*(Math.PI/2);
            if (isPressing) player.dy = -19;
        } else {
            player.rot += 0.22;
        }

        document.getElementById('lvlNum').innerText = currentLvl;
        document.getElementById('percent').innerText = progress;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Suelo de referencia
        ctx.strokeStyle = '#f05'; ctx.setLineDash([5, 15]);
        ctx.beginPath(); ctx.moveTo(0, voidLine); ctx.lineTo(canvas.width, voidLine); ctx.stroke();
        ctx.setLineDash([]);

        const lvlData = levels[currentLvl];
        lvlData.forEach((obj, i) => {
            let ox = 150 + (i * step) - distance;
            if (ox < -100 || ox > canvas.width + 100) return;
            let oy = voidLine - 50 - obj[1];
            
            if (obj[0] === 1) {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(ox, oy, 80, 50); ctx.strokeRect(ox, oy, 80, 50);
            } else {
                ctx.save(); ctx.translate(ox + 40, oy + 30); ctx.rotate(Date.now()*0.01);
                ctx.fillStyle = '#f30';
                for(let j=0; j<8; j++){
                    ctx.rotate(Math.PI/4);
                    ctx.beginPath(); ctx.moveTo(0,-25); ctx.lineTo(10,0); ctx.lineTo(-10,0); ctx.fill();
                }
                ctx.restore();
            }
        });

        // Jugador
        ctx.save(); ctx.translate(player.x+20, player.y+20); ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.fillRect(-20, -20, 40, 40);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.onpointerdown = () => isPressing = true;
    window.onpointerup = () => isPressing = false;
    draw();
</script>
</body>
</html>
