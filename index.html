<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Floor is Lava</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 18px; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        h1 { color: #f05; font-size: 55px; text-shadow: 0 0 25px #f05; margin: 0; padding: 0; }
        .credits { color: #0fcc; font-size: 16px; margin-top: 5px; margin-bottom: 40px; font-family: sans-serif; letter-spacing: 2px; }
        .btn-real { padding: 20px 60px; font-size: 28px; background-color: #0fcc; color: black; border: 4px solid white; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #0fcc; -webkit-appearance: none; }
    </style>
</head>
<body>

    <div id="ui">LVL: <span id="lvlNum">1</span> | <span id="percent">0</span>%</div>

    <div id="menu" class="overlay">
        <h1>DEATH CUBE</h1>
        <div class="credits">CREADO POR OBET</div>
        <button class="btn-real" id="startBtn">START GAME</button>
    </div>

    <div id="victory" class="overlay" style="display:none">
        <h1 style="color: #0fcc">LEVEL COMPLETE!</h1>
        <div class="credits">¡NADIE SUPERA LOS RETOS DE OBET!</div>
        <button class="btn-real" id="nextBtn" style="background-color: #f05; color: white; box-shadow: 0 0 20px #f05;">NEXT LEVEL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const groundLimit = canvas.height / 2 + 100;
    let currentLvl = 1;
    let distance = 0;
    let isPressing = false;
    let gameActive = false;
    const stepWidth = 280; 

    const player = { x: 150, y: groundLimit - 250, w: 40, h: 40, dy: 0, rot: 0, onGround: false };
    const particles = [];

    // NIVELES: Solo plataformas arriba. Si caes al suelo, mueres.
    const allLevels = {
        1: { color: '#0a0a20', blocks: [[1,100],[1,100],[2,100],[1,100],[1,200],[1,200],[2,200],[1,200],[1,100],[1,100]] },
        2: { color: '#200a0a', blocks: [[1,100],[2,100],[1,100],[1,200],[2,200],[1,200],[1,300],[2,300],[1,300],[1,100]] },
        3: { color: '#0a200a', blocks: [[1,100],[2,100],[1,150],[2,150],[1,200],[2,200],[1,250],[2,250],[1,150],[1,50]] },
        // ... puedes seguir el patrón para el resto
    };

    function launchGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('victory').style.display = 'none';
        document.getElementById('lvlNum').innerText = currentLvl;
        distance = 0;
        player.y = groundLimit - 250; 
        player.dy = 0;
        player.rot = 0;
        gameActive = true;
    }

    document.getElementById('startBtn').onclick = launchGame;
    document.getElementById('nextBtn').onclick = () => { currentLvl++; launchGame(); };

    function update() {
        if (!gameActive) return;
        
        let speed = 9 + (currentLvl * 0.5); 
        distance += speed;
        player.dy += 1.3; // Gravedad
        player.y += player.dy;

        // Estela
        if (Math.random() > 0.4) particles.push({x: player.x, y: player.y+20, s: Math.random()*10+5, o: 1});
        for (let i = particles.length-1; i>=0; i--) {
            particles[i].o -= 0.05;
            if (particles[i].o <= 0) particles.splice(i,1);
        }

        const lvl = allLevels[currentLvl] || allLevels[1];
        const totalDist = lvl.blocks.length * stepWidth;

        if (distance > totalDist + 800) {
            gameActive = false;
            document.getElementById('victory').style.display = 'flex';
            return;
        }

        // --- LÓGICA DE MUERTE POR SUELO ---
        if (player.y > groundLimit - 40) {
            distance = 0; // Reset por tocar el suelo
            player.y = groundLimit - 250;
            player.dy = 0;
        }

        let standingOn = false;

        lvl.blocks.forEach((obj, i) => {
            const type = obj[0]; const alt = obj[1];
            let ox = 800 + (i * stepWidth) - distance;
            let oy = groundLimit - alt - 50;

            if (ox > player.x - 55 && ox < player.x + 55) {
                if (type === 1) { // Bloque negro
                    if (player.y + 40 <= oy + 25 && player.y + 40 + player.dy >= oy && player.x + 35 > ox && player.x + 5 < ox + 50) {
                        player.y = oy - 40; player.dy = 0; standingOn = true;
                    } else if (player.x + 40 > ox + 5 && player.x < ox + 45 && player.y + 40 > oy + 5 && player.y < oy + 45) distance = 0;
                } else if (type === 2) { // Triángulo rojo
                    let py = groundLimit - alt;
                    if (player.x + 30 > ox && player.x + 10 < ox + 50 && player.y + 40 > py - 40 && player.y < py) distance = 0;
                }
            }
        });

        if (standingOn) {
            player.rot = Math.round(player.rot / 1.57) * 1.57;
            if (isPressing) { player.dy = -18; standingOn = false; }
        } else {
            player.rot += 0.25;
        }
        
        document.getElementById('percent').innerText = Math.min(Math.floor((distance/totalDist)*100), 100);
    }

    function draw() {
        const lvl = allLevels[currentLvl] || allLevels[1];
        ctx.fillStyle = lvl.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // El suelo ahora es una línea roja de peligro
        ctx.fillStyle = '#f05'; ctx.fillRect(0, groundLimit, canvas.width, 5);

        lvl.blocks.forEach((obj, i) => {
            const type = obj[0]; const alt = obj[1];
            let ox = 800 + (i * stepWidth) - distance;
            let oy = groundLimit - alt - 50;
            if (ox < -100 || ox > canvas.width) return;

            if (type === 1) { // Bloque
                ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(ox, oy, 50, 50); ctx.strokeRect(ox, oy, 50, 50);
            } else if (type === 2) { // Pico
                ctx.fillStyle = '#f05'; ctx.beginPath();
                ctx.moveTo(ox, groundLimit - alt); ctx.lineTo(ox+25, groundLimit - alt - 50); ctx.lineTo(ox+50, groundLimit - alt); ctx.fill();
            }
        });

        // Dibujar Cubo Malvado
        ctx.save(); ctx.translate(player.x+20, player.y+20); ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.shadowBlur = 15; ctx.shadowColor = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40); 
        ctx.shadowBlur = 0; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-12,-10); ctx.lineTo(-4,-4); ctx.stroke(); // Ojo
        ctx.beginPath(); ctx.moveTo(12,-10); ctx.lineTo(4,-4); ctx.stroke();  // Ojo
        ctx.beginPath(); ctx.moveTo(-10,8); ctx.lineTo(0,15); ctx.lineTo(10,8); ctx.stroke(); // Boca
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('touchstart', (e) => { if (gameActive) { isPressing = true; e.preventDefault(); } }, {passive: false});
    window.addEventListener('touchend', () => isPressing = false);
    draw();
</script>
</body>
</html>
