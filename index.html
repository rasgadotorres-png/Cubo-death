<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Evil Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 18px; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        h1 { color: #f05; font-size: 55px; text-shadow: 0 0 25px #f05; margin: 0; padding: 0; }
        .credits { color: #0fcc; font-size: 16px; margin-top: 5px; margin-bottom: 40px; font-family: sans-serif; letter-spacing: 2px; }
        .btn-real { padding: 20px 60px; font-size: 28px; background-color: #0fcc; color: black; border: 4px solid white; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #0fcc; -webkit-appearance: none; }
        .btn-real:active { transform: scale(0.95); background-color: #0aa; }
    </style>
</head>
<body>

    <div id="ui">LVL: <span id="lvlNum">1</span> | <span id="percent">0</span>%</div>

    <div id="menu" class="overlay">
        <h1>DEATH CUBE</h1>
        <div class="credits">CREADO POR OBET</div>
        <button class="btn-real" id="startBtn">START GAME</button>
    </div>

    <div id="victory" class="overlay" style="display:none">
        <h1 style="color: #0fcc">LEVEL COMPLETE!</h1>
        <div class="credits">¡EL CUBO MALO TIENE MIEDO DE OBET!</div>
        <button class="btn-real" id="nextBtn" style="background-color: #f05; color: white; box-shadow: 0 0 20px #f05;">NEXT LEVEL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const groundY = canvas.height / 2 + 100;
    let currentLvl = 1;
    let distance = 0;
    let isPressing = false;
    let gameActive = false;
    const stepWidth = 260; 

    const player = { x: 150, y: groundY - 40, w: 40, h: 40, dy: 0, rot: 0, onGround: false };
    const particles = [];

    // --- 10 NIVELES HARDCORE ---
    const allLevels = {
        1: { color: '#0a0a20', blocks: [[1,0],[2,0],[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,50],[2,50],[1,0],[2,0],[2,0],[1,0],[2,0],[1,0],[2,0],[1,0],[2,0]] },
        2: { color: '#200a0a', blocks: [[1,0],[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,100],[1,50],[2,50],[1,0],[2,0],[2,0],[2,0],[1,0],[2,0]] },
        3: { color: '#0a200a', blocks: [[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,200],[2,200],[1,100],[2,100],[1,50],[2,50],[1,0],[2,0],[2,0],[1,0],[2,0]] },
        4: { color: '#150015', blocks: [[1,0],[2,0],[2,0],[1,80],[2,80],[1,160],[2,160],[1,80],[2,80],[1,160],[2,160],[1,240],[2,240],[1,160],[1,80],[2,0],[1,0],[2,0]] },
        5: { color: '#1a1a00', blocks: [[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,100],[2,100],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,0],[2,0]] },
        6: { color: '#001a1a', blocks: [[1,0],[1,50],[1,100],[2,100],[1,150],[2,150],[1,200],[2,200],[1,150],[1,100],[2,100],[1,50],[2,50],[1,0],[2,0],[2,0],[1,0],[2,0]] },
        7: { color: '#2b1a00', blocks: [[1,0],[2,0],[1,80],[2,80],[1,160],[2,160],[1,240],[2,240],[1,160],[2,160],[1,80],[2,80],[1,160],[2,160],[1,0],[2,0],[1,0],[2,0]] },
        8: { color: '#1a000d', blocks: [[1,0],[1,100],[2,100],[1,200],[2,200],[1,100],[2,100],[1,0],[1,100],[2,100],[1,200],[2,200],[1,0],[2,0],[2,0],[1,0],[2,0]] },
        9: { color: '#000000', blocks: [[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,200],[2,200],[1,250],[2,250],[1,150],[2,150],[1,0],[2,0],[2,0],[1,0]] },
        10:{ color: '#1c1c1c', blocks: [[1,0],[2,0],[1,50],[2,50],[1,100],[2,100],[1,150],[2,150],[1,200],[2,200],[1,250],[2,250],[1,300],[2,300],[1,0],[2,0],[2,0],[2,0],[2,0]] }
    };

    function launchGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('victory').style.display = 'none';
        document.getElementById('lvlNum').innerText = currentLvl;
        distance = 0;
        player.y = groundY - 40;
        player.dy = 0;
        player.rot = 0;
        gameActive = true;
    }

    document.getElementById('startBtn').onclick = launchGame;
    document.getElementById('nextBtn').onclick = function() {
        currentLvl++;
        if (currentLvl > 10) { alert("¡ERES UNA LEYENDA!"); currentLvl = 1; }
        launchGame();
    };

    function update() {
        if (!gameActive) return;
        
        let speed = 9 + (currentLvl * 0.4); 
        distance += speed;
        player.dy += 1.25; 
        player.y += player.dy;

        if (Math.random() > 0.4) particles.push({x: player.x, y: player.y+20, s: Math.random()*10+5, o: 1});
        for (let i = particles.length-1; i>=0; i--) {
            particles[i].o -= 0.05;
            if (particles[i].o <= 0) particles.splice(i,1);
        }

        const lvl = allLevels[currentLvl];
        const totalDist = lvl.blocks.length * stepWidth;

        if (distance > totalDist + 600) {
            gameActive = false;
            document.getElementById('victory').style.display = 'flex';
            return;
        }

        let standingOn = null;
        if (player.y > groundY - 40) { player.y = groundY - 40; player.dy = 0; standingOn = "ground"; }

        lvl.blocks.forEach((obj, i) => {
            const type = obj[0]; const alt = obj[1];
            let ox = 800 + (i * stepWidth) - distance;
            let oy = groundY - alt - 50;

            if (ox > player.x - 60 && ox < player.x + 60) {
                if (type === 1) { 
                    if (player.y + 40 <= oy + 25 && player.y + 40 + player.dy >= oy && player.x + 35 > ox && player.x + 5 < ox + 50) {
                        player.y = oy - 40; player.dy = 0; standingOn = "block";
                    } else if (player.x + 40 > ox + 5 && player.x < ox + 45 && player.y + 40 > oy + 5 && player.y < oy + 45) distance = 0;
                } else if (type === 2) {
                    let py = groundY - alt;
                    if (player.x + 32 > ox && player.x + 8 < ox + 50 && player.y + 40 > py - 38 && player.y < py) distance = 0;
                }
            }
        });

        player.onGround = (standingOn !== null);
        if (player.onGround) {
            player.rot = Math.round(player.rot / 1.57) * 1.57;
            if (isPressing) { player.dy = -17.5; player.onGround = false; }
        } else player.rot += 0.22;

        document.getElementById('percent').innerText = Math.min(Math.floor((distance/totalDist)*100), 100);
    }

    function draw() {
        const lvlColor = allLevels[currentLvl].color;
        ctx.fillStyle = lvlColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, 'rgba(0,0,0,0.6)'); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => { ctx.fillStyle = `rgba(0,255,204,${p.o})`; ctx.fillRect(p.x-distance*0.1, p.y, p.s, p.s); });
        ctx.fillStyle = '#0ff'; ctx.fillRect(0, groundY, canvas.width, 2);

        allLevels[currentLvl].blocks.forEach((obj, i) => {
            const type = obj[0]; const alt = obj[1];
            let ox = 800 + (i * stepWidth) - distance;
            let oy = groundY - alt - 50;
            if (ox < -100 || ox > canvas.width) return;

            if (type === 1) {
                ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(ox, oy, 50, 50); ctx.strokeRect(ox, oy, 50, 50);
            } else if (type === 2) {
                ctx.fillStyle = '#f05'; ctx.beginPath();
                ctx.moveTo(ox, groundY - alt); ctx.lineTo(ox+25, groundY - alt - 50); ctx.lineTo(ox+50, groundY - alt); ctx.fill();
            }
        });

        // --- DIBUJAR EL CUBO CON LA CARA MALVADA ---
        ctx.save(); 
        ctx.translate(player.x+20, player.y+20); 
        ctx.rotate(player.rot);
        
        // Efecto Neón para el cubo
        ctx.shadowBlur = 15; 
        ctx.shadowColor = '#0fcc';
        
        // Cuerpo del cubo (Relleno Cyan)
        ctx.fillStyle = '#0fcc'; 
        ctx.fillRect(-20, -20, 40, 40); 
        
        // Quitar efecto neón para los ojos y la boca para que se vean nítidos
        ctx.shadowBlur = 0;
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000'; // Color Negro para la expresión
        
        // DIBUJAR CARA MALVADA
        // Ojo Izquierdo (Línea agresiva hacia abajo)
        ctx.beginPath();
        ctx.moveTo(-12, -10);
        ctx.lineTo(-4, -4);
        ctx.stroke();
        
        // Ojo Derecho (Línea agresiva simétrica)
        ctx.beginPath();
        ctx.moveTo(12, -10);
        ctx.lineTo(4, -4);
        ctx.stroke();
        
        // Boca Malvada (Sonrisa de pico)
        ctx.beginPath();
        ctx.moveTo(-10, 8);
        ctx.lineTo(0, 15);
        ctx.lineTo(10, 8);
        ctx.stroke();
        
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('touchstart', (e) => { if (gameActive) { isPressing = true; e.preventDefault(); } }, {passive: false});
    window.addEventListener('touchend', () => isPressing = false);
    draw();
</script>
</body>
</html>
