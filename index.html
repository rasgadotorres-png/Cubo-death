<!DOCTYPE html>
<html>
<head>
    <title>Death Cube - Void Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 18px; z-index: 10; pointer-events: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        h1 { color: #f05; font-size: 50px; text-shadow: 0 0 20px #f05; margin: 0; }
        .credits { color: #0fcc; font-size: 14px; margin-bottom: 30px; letter-spacing: 2px; }
        .btn-real { padding: 20px 50px; font-size: 25px; background: #0fcc; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #0fcc; -webkit-appearance: none; }
    </style>
</head>
<body>

    <div id="ui">LVL: <span id="lvlNum">1</span> | <span id="percent">0</span>%</div>

    <div id="menu" class="overlay">
        <h1>DEATH CUBE</h1>
        <div class="credits">VOID EDITION - BY OBET</div>
        <button class="btn-real" id="startBtn">SURVIVE THE VOID</button>
    </div>

    <div id="victory" class="overlay" style="display:none">
        <h1 style="color: #0fcc">MASTERED</h1>
        <button class="btn-real" id="nextBtn" style="background:#f05; box-shadow: 0 0 20px #f05; color:white;">NEXT LEVEL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const voidLine = canvas.height / 2 + 150; 
    let currentLvl = 1;
    let distance = 0;
    let isPressing = false;
    let gameActive = false;
    const step = 250; 

    const player = { x: 150, y: 0, dy: 0, rot: 0, onG: false };

    // --- NIVELES DE PARKOUR (TODOS EMPIEZAN CON [1,0],[1,0],[1,0] PARA SEGURIDAD) ---
    const allLevels = {
        1: { color: '#050515', b: [[1,0],[1,0],[1,0],[2,0],[1,0],[2,0],[1,80],[1,80],[1,0],[2,0],[1,0]] },
        2: { color: '#150505', b: [[1,0],[1,0],[1,0],[1,60],[1,120],[1,120],[2,120],[1,60],[1,0],[2,0]] },
        3: { color: '#051505', b: [[1,0],[1,0],[1,0],[2,0],[1,100],[1,180],[1,100],[2,100],[1,0],[2,0]] },
        4: { color: '#100015', b: [[1,0],[1,0],[1,0],[1,80],[1,0],[1,80],[1,160],[2,160],[1,80],[1,0]] },
        5: { color: '#151500', b: [[1,0],[1,0],[1,0],[1,50],[1,100],[1,150],[2,150],[1,100],[2,100],[1,0]] },
        6: { color: '#001515', b: [[1,0],[1,0],[1,0],[2,0],[1,120],[2,120],[1,0],[2,0],[1,120],[1,200]] },
        7: { color: '#150a00', b: [[1,0],[1,0],[1,0],[1,100],[1,0],[1,100],[1,200],[2,200],[1,100],[1,0]] },
        8: { color: '#15000a', b: [[1,0],[1,0],[1,0],[2,0],[2,0],[1,120],[2,120],[2,120],[1,0],[2,0]] },
        9: { color: '#000000', b: [[1,0],[1,0],[1,0],[1,80],[1,160],[1,240],[2,240],[1,160],[1,0],[2,0]] },
        10:{ color: '#0a0a0a', b: [[1,0],[1,0],[1,0],[2,0],[1,100],[2,100],[1,200],[2,200],[1,300],[2,0]] }
    };

    function launch() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('victory').style.display = 'none';
        distance = 0; 
        player.y = voidLine - 400; // Aparece más arriba para caer suavemente en la plataforma
        player.dy = 0; 
        player.rot = 0;
        gameActive = true;
    }

    document.getElementById('startBtn').onclick = launch;
    document.getElementById('nextBtn').onclick = () => { currentLvl++; launch(); };

    function reset() {
        distance = 0;
        player.y = voidLine - 400;
        player.dy = 0;
    }

    function update() {
        if (!gameActive) return;
        let speed = 8 + (currentLvl * 0.4);
        distance += speed;
        player.dy += 1.25;
        player.y += player.dy;

        const lvl = allLevels[currentLvl];
        const total = lvl.b.length * step;

        if (distance > total + 600) { gameActive = false; document.getElementById('victory').style.display = 'flex'; return; }

        // MUERTE POR CAER AL VACÍO
        if (player.y > voidLine + 100) reset();

        let supported = false;
        lvl.b.forEach((obj, i) => {
            let ox = 600 + (i * step) - distance; // Moví el spawn un poco a la izquierda (600) para más tiempo
            let oy = voidLine - 50 - obj[1];
            
            if (ox > player.x - 60 && ox < player.x + 60) {
                if (obj[0] === 1) { // Bloque
                    if (player.y + 40 <= oy + 30 && player.y + 40 + player.dy >= oy && player.x + 35 > ox && player.x + 5 < ox + 50) {
                        player.y = oy - 40; player.dy = 0; supported = true;
                    } 
                    else if (player.x + 38 > ox + 5 && player.x < ox + 45 && player.y + 35 > oy) reset();
                } 
                else if (obj[0] === 2) { // Pico
                    let py = voidLine - obj[1];
                    if (player.x + 28 > ox && player.x + 12 < ox + 50 && player.y + 38 > py - 40) reset();
                }
            }
        });

        player.onG = supported;
        if (player.onG) {
            player.rot = Math.round(player.rot/1.57)*1.57;
            if (isPressing) { player.dy = -17.5; player.onG = false; }
        } else { player.rot += 0.22; }

        document.getElementById('lvlNum').innerText = currentLvl;
        document.getElementById('percent').innerText = Math.min(Math.floor((distance/total)*100), 100);
    }

    function draw() {
        ctx.fillStyle = allLevels[currentLvl].color;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // El Vacío
        ctx.strokeStyle = '#f05'; ctx.lineWidth = 2; ctx.setLineDash([15, 10]);
        ctx.beginPath(); ctx.moveTo(0, voidLine); ctx.lineTo(canvas.width, voidLine); ctx.stroke();
        ctx.setLineDash([]);

        allLevels[currentLvl].b.forEach((obj, i) => {
            let ox = 600 + (i * step) - distance;
            let oy = voidLine - 50 - obj[1];
            if (ox < -100 || ox > canvas.width) return;

            if (obj[0] === 1) {
                ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.fillRect(ox, oy, 50, 50); ctx.strokeRect(ox, oy, 50, 50);
            } else {
                ctx.fillStyle = '#f05'; ctx.beginPath();
                ctx.moveTo(ox, voidLine - obj[1]); ctx.lineTo(ox+25, voidLine - obj[1]-50); ctx.lineTo(ox+50, voidLine - obj[1]); ctx.fill();
            }
        });

        // CUBO CON CARA MALVADA
        ctx.save(); ctx.translate(player.x+20, player.y+20); ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc'; ctx.shadowBlur = 15; ctx.shadowColor = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40);
        ctx.shadowBlur = 0; ctx.strokeStyle = 'red'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(-4,-2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(12,-8); ctx.lineTo(4,-2); ctx.stroke();
        ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-10,10); ctx.lineTo(0,4); ctx.lineTo(10,10); ctx.stroke();
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('touchstart', (e) => { if(gameActive) isPressing = true; e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', () => isPressing = false);
    draw();
</script>
</body>
</html>
