<!DOCTYPE html>
<html>
<head>
    <title>Neon Dash Ultra Lite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #percent { position: fixed; top: 10px; width: 100%; text-align: center; color: #0ff; font-size: 20px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="percent">0%</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const groundY = canvas.height / 2 + 100;
    let distance = 0;
    let isPressing = false;

    const player = { x: 100, y: groundY-40, dy: 0, onGround: false, rot: 0 };
    const level = [0,0,2,0,1,0,2,1,1,2,0,1,2,2,0,1,1,2,0,2,1,1,2,2,0,2,2,1,2,2,2,0,1,1,1,2,2,2,2];

    function update() {
        distance += 8.5;
        player.dy += 1.1;
        player.y += player.dy;

        if (player.y >= groundY - 40) {
            player.y = groundY - 40;
            player.dy = 0;
            player.onGround = true;
            player.rot = Math.round(player.rot / (Math.PI/2)) * (Math.PI/2);
        } else {
            player.onGround = false;
            player.rot += 0.18;
        }

        if (player.onGround && isPressing) {
            player.dy = -16;
            player.onGround = false;
        }

        // Colisiones
        level.forEach((type, i) => {
            let ox = 800 + (i * 200) - distance;
            if (ox > 80 && ox < 140) {
                if (type === 2 && player.y > groundY - 60) distance = 0; // Reset si muere
                if (type === 1) {
                    if (player.y > groundY - 95 && player.y < groundY - 70) {
                        player.y = groundY - 90; player.dy = 0; player.onGround = true;
                    } else if (player.y > groundY - 60) distance = 0;
                }
            }
        });
        document.getElementById('percent').innerText = Math.floor(distance / 80) + "%";
    }

    function draw() {
        ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0ff'; ctx.fillRect(0, groundY, canvas.width, 2);

        level.forEach((type, i) => {
            let ox = 800 + (i * 200) - distance;
            if (ox > -100 && ox < canvas.width) {
                if (type === 1) {
                    ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#0ff';
                    ctx.fillRect(ox, groundY-50, 50, 50); ctx.strokeRect(ox, groundY-50, 50, 50);
                } else if (type === 2) {
                    ctx.fillStyle = '#f05'; ctx.beginPath();
                    ctx.moveTo(ox, groundY); ctx.lineTo(ox+25, groundY-50); ctx.lineTo(ox+50, groundY); ctx.fill();
                }
            }
        });

        ctx.save();
        ctx.translate(player.x+20, player.y+20);
        ctx.rotate(player.rot);
        ctx.fillStyle = '#0fcc';
        ctx.fillRect(-20, -20, 40, 40);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('touchstart', (e) => { isPressing = true; e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', () => { isPressing = false; });

    draw();
</script>
</body>
</html>
